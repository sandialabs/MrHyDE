verbosity: high
"coarse: max size": 300
"multigrid algorithm": sa
"aggregation: type": uncoupled
"aggregation: drop tol": 0.0
"smoother: type": CHEBYSHEV
"smoother: params":
  "chebyshev: degree": 1
  "chebyshev: ratio eigenvalue": 1.1
  "chebyshev: min eigenvalue": 0.1
  "eigen-analysis: type": power-method
  "chebyshev: eigenvalue max iterations": 15
"coarse: type": KLU
