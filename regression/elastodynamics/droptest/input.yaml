%YAML 1.1
---
ANONYMOUS:
  verbosity: 0
  debug level: 0
  Mesh:
    dimension: 2
    element type: quad
    xmin: 0.0
    xmax: 1.0
    ymin: 0.0
    ymax: 1.0
    NX: 40
    NY: 40
  Physics:
    modules: elastodynamics
    Dirichlet conditions:
      scalar data: true
      dx:
        all boundaries: 0.0
      dy:
        all boundaries: 0.0
      vx:
        all boundaries: 0.0
      vy:
        all boundaries: 0.0
    Initial conditions:
      scalar data: false
      dx: '0.1*exp(hump)'
      dy: '0.0'
      vx: '0.0'
      vy: '0.0'
  Functions:
    lambda: '1.0'
    mu: '1.0'
    rho: '1.0'
    source dx: '0.0'
    source dy: '0.0'
    hump: '-100.0*(x-0.5)*(x-0.5) - 100*(y-0.5)*(y-0.5)'
  Discretization:
    order:
      dx: 1
      dy: 1
      vx: 1
      vy: 1
    quadrature: 2
  Solver:
    solver: transient
    workset size: 100
    max nonlinear iters: 2
    linear TOL: 1.0e-10
    transient Butcher tableau: DIRK-1,2
    final time: 5.0e-2
    delta t: 1.0e-2
    use direct solver: true
  Postprocess:
    write solution: false
    compute errors: true
    True solutions: # just for testing
      dx: '0.0'
      dy: '0.0'
      vx: '0.0'
      vy: '0.0'
  Analysis:
    analysis type: forward
...
