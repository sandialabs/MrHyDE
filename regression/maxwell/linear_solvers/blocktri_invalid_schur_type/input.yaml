%YAML 1.1
---
ANONYMOUS:
  debug level: 0
  verbosity: 5
  Mesh input file: ../input_common_maxwell_hex3d.yaml
  Physics input file: ../input_common_maxwell_hex3d.yaml
  Discretization input file: ../input_common_maxwell_hex3d.yaml
  Functions input file: ../input_common_maxwell_hex3d.yaml
  Solver input file: ../input_solver_common.yaml
  Solver:
    max linear iters: 14
    use preconditioner: true
    preconditioner reuse type: full
    preconditioner type: block triangular
    block prec backend: teko_full
    Pivot Block Settings:
      preconditioner type: AMG
      AMG Settings:
        verbosity: none
        'smoother: type': RELAXATION
        'smoother: params':
          'relaxation: type': Jacobi
          'relaxation: sweeps': 2
          'relaxation: damping factor': 0.66
        multigrid algorithm: sa
        'coarse: type': KLU
    Schur Block Settings:
      pivot block: 1
      approximation type: exact
      diag use lumped pivot diagonal: true
      preconditioner type: RefMaxwell
      hgrad basis name: phi_aux
      hcurl basis name: E
      RefMaxwell Settings:
        verbosity: none
        use as preconditioner: true
        hgrad basis name: phi_aux
        hcurl basis name: E
        hgrad basis order: 1
        hcurl basis order: 1
        'refmaxwell: space number': 1
        enable reuse: true
        use lumped M0inv: true
        disable addon: false
  Analysis input file: ../input_common_maxwell_hex3d.yaml
  Postprocess input file: ../input_common_maxwell_hex3d.yaml
...
