%YAML 1.1
---
# Block-diagonal preconditioner: 2 sweeps of Jacobi on each block.
# RefMaxwell is not used here; it is only meaningful for the Schur complement (block-triangular).
ANONYMOUS:
  debug level: 0
  verbosity: 5
  Mesh input file: ../input_common_maxwell_hex3d.yaml
  Physics input file: ../input_common_maxwell_hex3d.yaml
  Discretization input file: ../input_common_maxwell_hex3d.yaml
  Functions input file: ../input_common_maxwell_hex3d.yaml
  Solver input file: ../input_solver_common_t2.yaml
  Solver:
    max linear iters: 24 # converges under 18 iters on macOS
    use preconditioner: true
    reuse preconditioner: false
    preconditioner type: block diagonal
    Block 0 Settings:
      preconditioner variant: RELAXATION
      'relaxation: type': Jacobi
      'relaxation: sweeps': 1
      'relaxation: damping factor': 0.66
    Block 1 Settings:
      preconditioner variant: RELAXATION
      'relaxation: type': Jacobi
      'relaxation: sweeps': 1
      'relaxation: damping factor': 0.66
  Analysis input file: ../input_common_maxwell_hex3d.yaml
  Postprocess input file: ../input_common_maxwell_hex3d.yaml
...
